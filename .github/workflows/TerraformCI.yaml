name: Terraform CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # -----------------------------
  # 1️⃣ Detect Terraform changes
  # -----------------------------
  detect-changes:
    name: Detect Terraform Changes
    runs-on: [self-hosted, windows]
    outputs:
      terraform_changed: ${{ steps.detect.outputs.terraform_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main branch
        shell: powershell
        run: git fetch origin main

      - name: Detect Terraform changes
        id: detect
        shell: powershell
        run: |
          $changedFiles = git diff --name-only origin/main...HEAD
          $tfChanged = $changedFiles | Where-Object { $_ -like "*.tf" -or $_ -like "*.tfvars" -or $_ -eq ".terraform.lock.hcl" }

          if ($tfChanged) {
              echo "terraform_changed=true" >> $env:GITHUB_OUTPUT
              Write-Host "Changed Terraform files:`n$tfChanged"
          } else {
              echo "terraform_changed=false" >> $env:GITHUB_OUTPUT
              Write-Host "No Terraform files changed."
          }

  # -----------------------------
  # 2️⃣ PR Checks (fmt, validate, plan)
  # -----------------------------
  pr-checks:
    name: Terraform PR Checks
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.terraform_changed == 'true'
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: '1.4.0'

      - name: Terraform Init
        run: terraform init -backend=false
        shell: powershell

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        shell: powershell

      - name: Terraform Validate
        run: terraform validate -no-color
        shell: powershell

      - name: Terraform Plan
        run: terraform plan -no-color
        shell: powershell

  # -----------------------------
  # 3️⃣ Main Deployment (plan + apply)
  # -----------------------------
  deploy-main:
    name: Terraform Deploy
    needs: detect-changes
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.terraform_changed == 'true'
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: '1.4.0'

      - name: Terraform Init
        run: terraform init
        shell: powershell

      - name: Terraform Plan
        run: terraform plan -out=tfplan -no-color
        shell: powershell

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        shell: powershell
