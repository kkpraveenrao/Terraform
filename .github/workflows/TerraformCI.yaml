name: Terraform Checks

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  analyze-changes:
    name: Detect Terraform Changes
    runs-on: [self-hosted, windows]
    outputs:
      terraform_changed: ${{ steps.detect.outputs.terraform_changed }}

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2️⃣ Fetch main branch for comparison
      - name: Fetch main branch
        shell: powershell
        run: git fetch origin main

      # 3️⃣ Detect Terraform changes using Git
      - name: Detect Terraform changes
        id: detect
        shell: powershell
        run: |
          # Get list of changed files between current branch and main
          $changedFiles = git diff --name-only origin/main...HEAD

          # Filter only Terraform files
          $tfChanged = $changedFiles | Where-Object { $_ -like "*.tf" -or $_ -like "*.tfvars" -or $_ -eq ".terraform.lock.hcl" }

          if ($tfChanged) {
              echo "terraform_changed=true" >> $env:GITHUB_OUTPUT
              Write-Host "Changed Terraform files:`n$tfChanged"
          } else {
              echo "terraform_changed=false" >> $env:GITHUB_OUTPUT
              Write-Host "No Terraform files changed."
          }

      # 4️⃣ Show result
      - name: Show result
        run: echo "Terraform changed? ${{ steps.detect.outputs.terraform_changed }}"

  terraform-validate:
    name: Terraform Validate
    needs: analyze-changes
    if: needs.analyze-changes.outputs.terraform_changed == 'true'
    runs-on: [self-hosted, windows]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure Terraform is installed
        run: |
          if (!(Test-Path "$env:ProgramFiles\Terraform\terraform.exe")) {
            Invoke-WebRequest -Uri "https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_windows_amd64.zip" -OutFile "$env:TEMP\terraform.zip"
            Expand-Archive "$env:TEMP\terraform.zip" -DestinationPath "$env:ProgramFiles\Terraform"
            setx PATH "$env:ProgramFiles\Terraform;$env:PATH"
          }
        shell: powershell

      - name: Terraform Init
        run: terraform init -backend=false
        shell: powershell

      - name: Terraform Format Check
        run: terraform fmt -check
        shell: powershell

      - name: Terraform Validate
        run: terraform validate -no-color
        shell: powershell
